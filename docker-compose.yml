services:
    postgres:
        image: postgres:16
        container_name: postgres
        restart: always
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        ports:
            - "127.0.0.1:5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data

    adminer:
        image: adminer
        container_name: adminer
        restart: always
        expose:
            - "8080" # только внутри сети Docker

    nginx:
        image: nginx:latest
        container_name: adminer-nginx
        restart: always
        ports:
            - "443:443" # Telegram Mini Apps
            - "8080:8080" # Админ панель базы данных
            - "8000:8000" # API
            - "5000:5000" # API
        extra_hosts:
            - "host.docker.internal:host-gateway"
        volumes:
            - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
            - /etc/letsencrypt/live/ai-box-cars.ru/fullchain.pem:/etc/ssl/certs/fullchain.pem:ro
            - /etc/letsencrypt/live/ai-box-cars.ru/privkey.pem:/etc/ssl/private/privkey.pem:ro
        depends_on:
            - adminer

volumes:
    postgres_data:
